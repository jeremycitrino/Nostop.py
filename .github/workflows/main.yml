name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake

      - name: Install Android SDK and accept licenses
        run: |
          # Download command line tools
          mkdir -p /home/runner/android-sdk/cmdline-tools
          cd /home/runner/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools cmdline-tools_temp
          mkdir cmdline-tools
          mv cmdline-tools_temp cmdline-tools/latest
          rm commandlinetools-linux-11076708_latest.zip
          
          # Create legacy tools/bin structure for Buildozer
          mkdir -p tools/bin
          ln -s /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/android-sdk/tools/bin/sdkmanager
          ln -s /home/runner/android-sdk/cmdline-tools/latest/bin/avdmanager /home/runner/android-sdk/tools/bin/avdmanager
          
          # Accept all licenses automatically
          yes | /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # Install required SDK components
          /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;37.0.0" \
            "ndk;25.2.9519653"

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Trading Bot
          package.name = tradingbot
          package.domain = org.example.tradingbot
          version = 1.0
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,json,db
          source.exclude_exts = spec
          source.exclude_dirs = tests, bin, build, .buildozer, .git, __pycache__, venv
          requirements = python3,kivy==2.1.0,pyjnius,android,plyer,yfinance,requests,setuptools==58.0.0
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.use_androidx = True
          android.copy_libs = True
          android.archs = arm64-v8a
          android.sdk_path = /home/runner/android-sdk
          android.ndk_path = /home/runner/android-sdk/ndk/25.2.9519653
          android.add_prebuild_command = pip install --upgrade setuptools

          [buildozer]
          log_level = 2
          build_dir = ./.buildozer
          bin_dir = ./bin
          android.accept_sdk_license = True
          EOF

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_HOME: /home/runner/android-sdk
