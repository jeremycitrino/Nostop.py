name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;30.0.3'
          accept-licenses: true

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Trading Bot
          package.name = tradingbot
          package.domain = org.example.tradingbot
          version = 1.0
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,json,db
          source.exclude_exts = spec
          source.exclude_dirs = tests, bin, build, .buildozer, .git, __pycache__, venv
          requirements = python3,kivy==2.1.0,pyjnius,android,plyer,yfinance,requests,setuptools==58.0.0
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.use_androidx = True
          android.copy_libs = True
          android.archs = arm64-v8a
          android.build_tools = 30.0.3
          android.add_prebuild_command = pip install --upgrade setuptools

          [buildozer]
          log_level = 2
          build_dir = ./.buildozer
          bin_dir = ./bin
          android.accept_sdk_license = True
          EOF

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
